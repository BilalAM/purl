<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURL - Link Preview</title>

    <!-- OG tags so this preview page itself is shareable -->
    <meta property="og:title" th:content="${siteName} + ' — Link Preview'" />
    <meta property="og:description" th:content="${description}" />
    <meta property="og:image" th:if="${!imageUrl.isEmpty()}" th:content="${imageUrl}" />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect rx='8' width='32' height='32' fill='%230d9488'/><text x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-size='18' font-weight='bold' fill='white' font-family='monospace'>P</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #fafaf9;
            --bg-card: #ffffff;
            --bg-elevated: #f3f3f0;
            --border: rgba(28, 25, 23, 0.06);
            --text: #44403c;
            --text-heading: #1c1917;
            --text-secondary: #57534e;
            --text-muted: #a8a29e;
            --accent: #0d9488;
            --accent-light: #14b8a6;
            --accent-dark: #0f766e;
            --accent-glow: rgba(13, 148, 136, 0.08);
            --gradient: linear-gradient(135deg, #0d9488, #14b8a6);
            --font: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
            --shadow: rgba(100, 100, 111, 0.15) 0px 7px 29px 0px;
            --shadow-sm: 0 2px 8px rgba(100, 100, 111, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            -webkit-font-smoothing: antialiased;
        }

        ::selection {
            background: var(--accent);
            color: #fff;
        }

        .wrapper {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* Image section */
        .card-image-wrapper {
            position: relative;
            background: var(--gradient);
            min-height: 60px;
        }

        .card-image {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            display: block;
        }

        .card-image-wrapper .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(transparent, rgba(0,0,0,0.15));
        }

        /* No-image header band */
        .card-header-band {
            height: 4px;
            background: var(--gradient);
        }

        .card-body { padding: 1.75rem; }

        /* Site info row */
        .site-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .site-favicon {
            width: 20px; height: 20px;
            border-radius: 4px;
            background: var(--bg-elevated);
        }

        .site-name {
            font-family: var(--mono);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge {
            margin-left: auto;
            background: var(--accent-glow);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 0.625rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.25rem 0.65rem;
            border-radius: 9999px;
            border: 1px solid rgba(13, 148, 136, 0.15);
        }

        .description {
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 0.75rem;
        }

        .ai-disclaimer {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            font-style: italic;
            margin-bottom: 1.25rem;
        }

        /* URL pill */
        .url-display {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.65rem 0.9rem;
            margin-bottom: 1.25rem;
        }

        .url-icon {
            flex-shrink: 0;
            width: 16px; height: 16px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .url-text {
            font-family: var(--mono);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            word-break: break-all;
        }

        /* Button */
        .go-btn {
            display: block;
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .go-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .go-btn:active { transform: translateY(0); }

        /* Progress */
        .progress-section {
            margin-top: 1rem;
            text-align: center;
        }

        .progress-track {
            width: 100%;
            height: 3px;
            background: var(--bg-elevated);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--gradient);
            border-radius: 2px;
        }

        .countdown-text {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .cancel-link {
            display: inline-block;
            margin-top: 0.4rem;
            font-size: 0.75rem;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
            border-bottom: 1px dashed var(--text-muted);
            transition: color 0.2s;
        }

        .cancel-link:hover {
            color: var(--text-secondary);
            border-color: var(--text-secondary);
        }

        .cancelled .progress-fill { transition: none; }

        .powered-by {
            text-align: center;
            margin-top: 1.25rem;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .powered-by a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .powered-by a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <!-- Image or thin gradient band -->
            <div th:if="${!imageUrl.isEmpty()}" class="card-image-wrapper">
                <img th:src="${imageUrl}"
                     class="card-image"
                     alt="Preview image"
                     onerror="this.parentElement.outerHTML='<div class=\'card-header-band\'></div>'" />
                <div class="overlay"></div>
            </div>
            <div th:if="${imageUrl.isEmpty()}" class="card-header-band"></div>

            <div class="card-body">
                <!-- Site info row -->
                <div class="site-row">
                    <img class="site-favicon"
                         th:src="'https://www.google.com/s2/favicons?sz=32&domain=' + ${siteName}"
                         alt=""
                         onerror="this.style.display='none'" />
                    <span class="site-name" th:text="${siteName}"></span>
                    <span class="badge">Preview</span>
                </div>

                <p class="description" th:text="${description}"></p>
                <p class="ai-disclaimer">This description was generated by AI based on the website content and may not be fully accurate.</p>

                <!-- URL pill -->
                <div class="url-display">
                    <svg class="url-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M6.5 9.5L9.5 6.5M7 11l-1.15 1.15a2.5 2.5 0 11-3.54-3.54L3.5 7.5M9 5l1.15-1.15a2.5 2.5 0 113.54 3.54L12.5 8.5"/>
                    </svg>
                    <span class="url-text" th:text="${originalUrl}"></span>
                </div>

                <a class="go-btn" id="goBtn" th:href="${originalUrl}">
                    Go to site &rarr;
                </a>

                <div class="progress-section" id="progressSection">
                    <div class="progress-track">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="countdown-text" id="countdownText">Redirecting in 5 seconds...</span>
                    <br/>
                    <span class="cancel-link" id="cancelLink">Cancel redirect</span>
                </div>
            </div>
        </div>
        <div class="powered-by">Powered by <a href="/">&lt;PURL /&gt;</a></div>
    </div>

    <script th:inline="javascript">
        const originalUrl = /*[[${originalUrl}]]*/ '';
        const totalSeconds = 8;
        let remaining = totalSeconds;
        let timer;

        const fill = document.getElementById('progressFill');
        const text = document.getElementById('countdownText');
        const section = document.getElementById('progressSection');

        // Start progress bar animation
        requestAnimationFrame(() => fill.style.width = '100%');
        fill.style.transition = `width ${totalSeconds}s linear`;

        timer = setInterval(() => {
            remaining--;
            if (remaining <= 0) {
                clearInterval(timer);
                window.location.href = originalUrl;
            } else {
                text.textContent = `Redirecting in ${remaining} second${remaining > 1 ? 's' : ''}...`;
            }
        }, 1000);

        document.getElementById('goBtn').addEventListener('click', (e) => {
            e.preventDefault();
            clearInterval(timer);
            window.location.href = originalUrl;
        });

        document.getElementById('cancelLink').addEventListener('click', () => {
            clearInterval(timer);
            section.classList.add('cancelled');
            fill.style.width = fill.getBoundingClientRect().width + 'px';
            text.textContent = 'Redirect cancelled.';
            document.getElementById('cancelLink').style.display = 'none';
        });
    </script>
</body>
</html>
