<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PURL - Link Preview</title>

    <!-- OG tags so this preview page itself is shareable -->
    <meta property="og:title" th:content="${siteName} + ' — Link Preview'" />
    <meta property="og:description" th:content="${description}" />
    <meta property="og:image" th:if="${!imageUrl.isEmpty()}" th:content="${imageUrl}" />

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .wrapper { width: 100%; max-width: 560px; }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .card-image {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
        }
        .card-body { padding: 32px; }
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .site-name {
            color: #999;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .description {
            color: #333;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .url-display {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            word-break: break-all;
            font-size: 13px;
            color: #666;
        }
        .url-display .label {
            color: #999;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 4px;
        }
        .continue-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .continue-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102,126,234,0.4);
        }
        .continue-btn:active { transform: translateY(0); }
        .powered-by {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <img th:if="${!imageUrl.isEmpty()}"
                 th:src="${imageUrl}"
                 class="card-image"
                 alt="Preview image" />
            <div class="card-body">
                <div class="badge">Link Preview</div>
                <div class="site-name" th:text="${siteName}"></div>
                <p class="description" th:text="${description}"></p>
                <div class="url-display">
                    <span class="label">Destination</span>
                    <span th:text="${originalUrl}"></span>
                </div>
                <a class="continue-btn" th:href="${originalUrl}">
                    Continue to site &rarr;
                </a>
            </div>
        </div>
        <div class="powered-by">Powered by PURL</div>
    </div>
</body>
</html>
